# =============================================================
# Sniper Car Care - Nginx Configuration for Hostinger VPS
# =============================================================
# This file configures 3 frontend sites:
#   Port 80   → POS Dashboard (Admin Panel)
#   Port 4000 → Customer Website - Saloon
#   Port 4001 → Customer Website - 4x4
# Backend API runs on Port 5000 (Node.js)
# =============================================================

# --- Site 1: POS Dashboard (Admin Panel) ---
# URL: http://72.62.254.128 (port 80)
server {
    listen 80;
    server_name 72.62.254.128;

    root /var/www/pos-dashboard;
    index index.html;

    # Backend API (Node.js on port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA routing - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|avif|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}

